presets:
  chain: ethereum
  provider: publicnode
  model: lstm
dataset:
  id: icdcs_2025_11_09
  span:
    start_date: '2025-07-05'
    end_date: '2025-11-09'
  temporal:
    max_delay_seconds: 36
    lookback_seconds: 600
  sampling:
    sample_count: 1000000
evaluation:
  duration_days: 1
acquisition:
  history_sample_budget:
study:
  id: default
model:
  input_projection_dim: 128
  hidden_size: 128
  num_layers: 2
  dropout: 0.1
  head_hidden_dim: 64
split:
  train_fraction: 0.8
  validation_fraction: 0.1
training:
  learning_rate: 0.0003
  weight_decay: 0.01
  batch_size: 64
  max_epochs: 50
  early_stopping:
    patience: 8
    min_delta: 0.0001
  gradient_clip_norm: 1.0
  action_loss_weight: 1.0
  fee_loss_weight: 0.25
simulation:
  window_seconds: 7200
  arrival_rate_per_second: 0.05
  repetitions: 50
artifact:
  variant: baseline
