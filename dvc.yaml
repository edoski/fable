vars:
  - params.yaml
  - src/spice/conf/runtime/local.yaml

stages:
  acquire:
    cmd: ./bin/spice-awake .venv/bin/spice-dvc acquire
    deps:
      - pyproject.toml
      - src/spice
    params:
      - params.yaml:
          - presets.chain
          - presets.provider
          - dataset.id
          - evaluation.date
          - dataset.temporal
          - dataset.sampling.sample_count
          - acquisition.history_sample_budget
    outs:
      - ${output_root}/datasets/${presets.chain}/${dataset.id}/history:
          persist: true
      - ${output_root}/datasets/${presets.chain}/${dataset.id}/evaluation:
          persist: true
      - ${output_root}/datasets/${presets.chain}/${dataset.id}/.spice:
          persist: true

  tune:
    cmd: ./bin/spice-awake .venv/bin/spice-dvc tune
    deps:
      - pyproject.toml
      - src/spice
      - ${output_root}/datasets/${presets.chain}/${dataset.id}/history
    params:
      - params.yaml:
          - presets.chain
          - presets.model
          - dataset.id
          - dataset.temporal
          - dataset.sampling.sample_count
          - split
          - study.id
          - model
          - training
    outs:
      - ${output_root}/models/${presets.chain}/${dataset.id}/${presets.model}/${dataset.temporal.max_delay_seconds}s/tuned/${study.id}/tuning/study.json
      - ${output_root}/models/${presets.chain}/${dataset.id}/${presets.model}/${dataset.temporal.max_delay_seconds}s/tuned/${study.id}/tuning/trials.json
      - ${output_root}/models/${presets.chain}/${dataset.id}/${presets.model}/${dataset.temporal.max_delay_seconds}s/tuned/${study.id}/tuning/best_params.json
      - ${output_root}/models/${presets.chain}/${dataset.id}/${presets.model}/${dataset.temporal.max_delay_seconds}s/tuned/${study.id}/tuning/trials

  train:
    cmd: ./bin/spice-awake .venv/bin/spice-dvc train
    deps:
      - pyproject.toml
      - src/spice
      - ${output_root}/datasets/${presets.chain}/${dataset.id}/history
    params:
      - params.yaml:
          - presets.chain
          - presets.model
          - dataset.id
          - dataset.temporal
          - dataset.sampling.sample_count
          - split
          - artifact.variant
          - study.id
          - model
          - training
    outs:
      - ${output_root}/models/${presets.chain}/${dataset.id}/${presets.model}/${dataset.temporal.max_delay_seconds}s/${artifact.variant}/${study.id}/artifact.json
      - ${output_root}/models/${presets.chain}/${dataset.id}/${presets.model}/${dataset.temporal.max_delay_seconds}s/${artifact.variant}/${study.id}/model.pt
      - ${output_root}/models/${presets.chain}/${dataset.id}/${presets.model}/${dataset.temporal.max_delay_seconds}s/${artifact.variant}/${study.id}/train_report.json

  simulate:
    cmd: ./bin/spice-awake .venv/bin/spice-dvc simulate
    deps:
      - pyproject.toml
      - src/spice
      - ${output_root}/models/${presets.chain}/${dataset.id}/${presets.model}/${dataset.temporal.max_delay_seconds}s/${artifact.variant}/${study.id}/artifact.json
      - ${output_root}/models/${presets.chain}/${dataset.id}/${presets.model}/${dataset.temporal.max_delay_seconds}s/${artifact.variant}/${study.id}/model.pt
      - ${output_root}/datasets/${presets.chain}/${dataset.id}/history
      - ${output_root}/datasets/${presets.chain}/${dataset.id}/evaluation
    params:
      - params.yaml:
          - presets.chain
          - presets.model
          - dataset.id
          - evaluation.date
          - dataset.temporal.max_delay_seconds
          - artifact.variant
          - study.id
          - simulation
    outs:
      - ${output_root}/models/${presets.chain}/${dataset.id}/${presets.model}/${dataset.temporal.max_delay_seconds}s/${artifact.variant}/${study.id}/simulation_report.json
