vars:
  - params.yaml

stages:
  acquire:
    cmd: >-
      .venv/bin/spice-acquire
      chain=${run.chain}
      provider=${run.provider}
      runtime.output_root=${run.output_root}
      max_delay_seconds=${run.max_delay_seconds}
      lookback_seconds=${run.lookback_seconds}
      target_anchor_count=${run.target_anchor_count}
    deps:
      - pyproject.toml
      - src/spice
    params:
      - params.yaml:
          - run.chain
          - run.provider
          - run.output_root
          - run.max_delay_seconds
          - run.lookback_seconds
          - run.target_anchor_count
    outs:
      - ${run.output_root}/datasets/${run.chain}/raw
      - ${run.output_root}/datasets/${run.chain}/enriched
      - ${run.output_root}/datasets/${run.chain}/.spice

  train:
    cmd: >-
      .venv/bin/spice-train
      chain=${run.chain}
      model=${run.model}
      provider=${run.provider}
      runtime.output_root=${run.output_root}
      max_delay_seconds=${run.max_delay_seconds}
      lookback_seconds=${run.lookback_seconds}
      target_anchor_count=${run.target_anchor_count}
      training.device=${training.device}
      training.max_epochs=${training.max_epochs}
      training.effective_batch_size=${training.effective_batch_size}
      training.early_stopping_patience=${training.early_stopping_patience}
    deps:
      - pyproject.toml
      - src/spice
      - ${run.output_root}/datasets/${run.chain}/enriched/history
    params:
      - params.yaml:
          - run.chain
          - run.model
          - run.provider
          - run.output_root
          - run.max_delay_seconds
          - run.lookback_seconds
          - run.target_anchor_count
          - training.device
          - training.max_epochs
          - training.effective_batch_size
          - training.early_stopping_patience
    outs:
      - ${run.output_root}/models/${run.chain}/${run.model}/${run.max_delay_seconds}s/artifact.json
      - ${run.output_root}/models/${run.chain}/${run.model}/${run.max_delay_seconds}s/model.pt
      - ${run.output_root}/models/${run.chain}/${run.model}/${run.max_delay_seconds}s/train_report.json

  simulate:
    cmd: >-
      .venv/bin/spice-simulate
      chain=${run.chain}
      model=${run.model}
      provider=${run.provider}
      runtime.output_root=${run.output_root}
      max_delay_seconds=${run.max_delay_seconds}
      lookback_seconds=${run.lookback_seconds}
      target_anchor_count=${run.target_anchor_count}
      training.device=${training.device}
      training.effective_batch_size=${training.effective_batch_size}
      simulation.window_seconds=${simulation.window_seconds}
      simulation.arrival_rate_per_second=${simulation.arrival_rate_per_second}
      simulation.repetitions=${simulation.repetitions}
    deps:
      - pyproject.toml
      - src/spice
      - ${run.output_root}/models/${run.chain}/${run.model}/${run.max_delay_seconds}s/artifact.json
      - ${run.output_root}/models/${run.chain}/${run.model}/${run.max_delay_seconds}s/model.pt
      - ${run.output_root}/datasets/${run.chain}/enriched/history
      - ${run.output_root}/datasets/${run.chain}/enriched/evaluation
    params:
      - params.yaml:
          - run.chain
          - run.model
          - run.provider
          - run.output_root
          - run.max_delay_seconds
          - run.lookback_seconds
          - run.target_anchor_count
          - training.device
          - training.effective_batch_size
          - simulation.window_seconds
          - simulation.arrival_rate_per_second
          - simulation.repetitions
    outs:
      - ${run.output_root}/models/${run.chain}/${run.model}/${run.max_delay_seconds}s/simulation_report.json

  tune:
    cmd: >-
      .venv/bin/spice-tune
      chain=${run.chain}
      model=${run.model}
      provider=${run.provider}
      runtime.output_root=${run.output_root}
      max_delay_seconds=${run.max_delay_seconds}
      lookback_seconds=${run.lookback_seconds}
      target_anchor_count=${run.target_anchor_count}
      training.device=${training.device}
      training.max_epochs=${training.max_epochs}
      training.effective_batch_size=${training.effective_batch_size}
      tuning.n_trials=${tuning.n_trials}
      tuning.prune=${tuning.prune}
    deps:
      - pyproject.toml
      - src/spice
      - ${run.output_root}/datasets/${run.chain}/enriched/history
    params:
      - params.yaml:
          - run.chain
          - run.model
          - run.provider
          - run.output_root
          - run.max_delay_seconds
          - run.lookback_seconds
          - run.target_anchor_count
          - training.device
          - training.max_epochs
          - training.effective_batch_size
          - tuning.n_trials
          - tuning.prune
    outs:
      - ${run.output_root}/models/${run.chain}/${run.model}/${run.max_delay_seconds}s/tuning
